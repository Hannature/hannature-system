name: Storybook → GitHub Pages

on:
  push:
    branches:
      - main

# GitHub Pages deploy permissions
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, queueing later runs.
concurrency:
  group: storybook-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build and deploy Storybook
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install
        run: npm install --no-audit --no-fund --prefer-offline

      - name: Build Storybook
        run: npx nx run @hannature/ui:build-storybook

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/storybook/ui

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
